- name: deploy podified Ironic
  ansible.builtin.shell: |
    {{ shell_header }}
    {{ oc_header }}
    oc patch openstackcontrolplane openstack --type=merge --patch '{{ ironic_patch }}'

- name: Wait for Ironic control plane services' CRs to become ready
  ansible.builtin.include_tasks:
    file: wait.yaml

- name: check that ironic is reachable and its endpoints are defined
  ansible.builtin.shell: |
    {{ shell_header }}
    {{ oc_header }}
    alias openstack="oc exec -t openstackclient -- openstack"

    ${BASH_ALIASES[openstack]} endpoint list -c "Service Name" -f yaml | grep ironic
    ${BASH_ALIASES[openstack]} baremetal node list
  register: ironic_running_result
  until: ironic_running_result is success
  retries: 60
  delay: "{{ ironic_retry_delay }}"

- name: check that ironic-inspector is reachable and its endpoints are defined
  ansible.builtin.shell: |
    {{ shell_header }}
    {{ oc_header }}
    alias openstack="oc exec -t openstackclient -- openstack"

    ${BASH_ALIASES[openstack]} endpoint list -c "Service Name" -f yaml | grep ironic-inspector

    # TODO(hjensas): When python3-ironic-inspector-client is in openstackclient container
    # https://github.com/openstack-k8s-operators/tcib/pull/148
    # ${BASH_ALIASES[openstack]} baremetal inspection list
  register: ironic_inspector_running_result
  until: ironic_inspector_running_result is success
  retries: 60
  delay: "{{ ironic_retry_delay }}"

- name: Disable Role Based Access Control
  ansible.builtin.shell: |
    {{ shell_header }}
    {{ oc_header }}

    oc patch openstackcontrolplane openstack --type=merge --patch '{{ ironic_disable_rbac_patch }}'

- name: Wait for Ironic control plane services' CRs to become ready
  ansible.builtin.include_tasks:
    file: wait.yaml

- name: Make sure nodes can be listed
  ansible.builtin.shell: |
    {{ shell_header }}
    {{ oc_header }}
    alias openstack="oc exec -t openstackclient -- openstack"
    ${BASH_ALIASES[openstack]} baremetal node list -f json | jq 'if (. | length) > 0 then true else halt_error(1) end'
  register: ironic_node_list_result
  until: ironic_node_list_result is success
  retries: 60
  delay: "{{ ironic_retry_delay }}"

- name: Set owner field on baremeteal nodes
  ansible.builtin.shell: |
    {{ shell_header }}
    {{ oc_header }}
    alias openstack="oc exec -t openstackclient -- openstack"

    ADMIN_PROJECT_ID=$(${BASH_ALIASES[openstack]} project show -c id -f value --domain default admin)
    NODE_LIST=$(${BASH_ALIASES[openstack]} baremetal node list -f json -c UUID -c Owner | jq -r '.[] | select(.Owner == null) | .UUID')
    for node in $NODE_LIST; do
      ${BASH_ALIASES[openstack]} baremetal node set --owner $ADMIN_PROJECT_ID $node;
    done
  register: ironic_set_owner_field_result

- name: Re-Enable Role Based Access Control
  ansible.builtin.shell: |
    {{ shell_header }}
    {{ oc_header }}

    oc patch openstackcontrolplane openstack --type=merge --patch '{{ ironic_enable_rbac_patch }}'

- name: Wait for Ironic control plane services' CRs to become ready
  ansible.builtin.include_tasks:
    file: wait.yaml

- name: Make sure nodes can be listed
  ansible.builtin.shell: |
    {{ shell_header }}
    {{ oc_header }}
    alias openstack="oc exec -t openstackclient -- openstack"
    ${BASH_ALIASES[openstack]} baremetal node list -f json | jq 'if (. | length) > 0 then true else halt_error(1) end'
  register: ironic_node_list_result
  until: ironic_node_list_result is success
  retries: 60
  delay: "{{ ironic_retry_delay }}"

- name: Patch conductor dnsmasq for UEFI iPXE boot chain
  when: ironic_conductor_dnsmasq_uefi_fix | bool
  ansible.builtin.shell: |
    {{ shell_header }}
    {{ oc_header }}
    CONDUCTOR_POD=$(oc get pods -n openstack -l component=conductor \
      -o jsonpath='{.items[0].metadata.name}')

    # Skip if already patched (idempotent)
    if oc exec -n openstack "$CONDUCTOR_POD" -c dnsmasq -- \
        grep -q 'dhcp-boot=tag:efi,tag:!ipxe' /var/lib/ironic/dnsmasq.conf; then
      echo "dnsmasq UEFI boot directives already present"
      exit 0
    fi

    CONDUCTOR_IP=$(oc get pod -n openstack "$CONDUCTOR_POD" \
      -o jsonpath='{.metadata.annotations.k8s\.v1\.cni\.cncf\.io/network-status}' | \
      python3 -c "import sys,json; nets=json.load(sys.stdin); print([n['ips'][0] for n in nets if n.get('name','').endswith('/{{ ironic_network }}') or n.get('interface','') == '{{ ironic_network }}'][0])")

    if [ -z "$CONDUCTOR_IP" ]; then
      echo "ERROR: Could not determine conductor IP on {{ ironic_network }} network"
      exit 1
    fi
    echo "Conductor IP: $CONDUCTOR_IP"

    # Wrap IPv6 addresses in brackets for URL construction (RFC 3986)
    CONDUCTOR_URL_IP="${CONDUCTOR_IP}"
    [[ "$CONDUCTOR_IP" == *:* ]] && CONDUCTOR_URL_IP="[${CONDUCTOR_IP}]"

    oc exec -n openstack "$CONDUCTOR_POD" -c dnsmasq -- sh -c \
      "printf '\n# UEFI iPXE boot chain (ironic-operator bug workaround)\ndhcp-boot=tag:efi,tag:!ipxe,snponly.efi\ndhcp-boot=tag:ipxe,http://%s:8088/boot.ipxe\n' \
        '${CONDUCTOR_URL_IP}' >> /var/lib/ironic/dnsmasq.conf"

    oc exec -n openstack "$CONDUCTOR_POD" -c dnsmasq -- kill 1
    sleep 15
    oc wait -n openstack --for condition=Ready --timeout=120s pod/"$CONDUCTOR_POD"

    oc exec -n openstack "$CONDUCTOR_POD" -c dnsmasq -- \
      grep 'dhcp-boot=tag:efi,tag:!ipxe' /var/lib/ironic/dnsmasq.conf

- name: Change the DNS server in the provisioning subnet
  ansible.builtin.shell: |
    {{ shell_header }}
    {{ oc_header }}
    alias openstack="oc exec -t openstackclient -- openstack"
    ${BASH_ALIASES[openstack]} subnet set --dns-nameserver {{ dns_server_provisioning_ip }} provisioning-subnet

- name: Reset node driver_info to use new deploy images
  ansible.builtin.shell: |
    {{ shell_header }}
    {{ oc_header }}
    alias openstack="oc exec -t openstackclient -- openstack"

    CONDUCTOR_POD=$(oc get pods -n openstack -l component=conductor \
      -o jsonpath='{.items[0].metadata.name}')
    CONDUCTOR_IP=$(oc get pod -n openstack "$CONDUCTOR_POD" \
      -o jsonpath='{.metadata.annotations.k8s\.v1\.cni\.cncf\.io/network-status}' | \
      python3 -c "import sys,json; nets=json.load(sys.stdin); print([n['ips'][0] for n in nets if n.get('name','').endswith('/{{ ironic_network }}') or n.get('interface','') == '{{ ironic_network }}'][0])")

    if [ -z "$CONDUCTOR_IP" ]; then
      echo "ERROR: Could not determine conductor IP on {{ ironic_network }} network"
      exit 1
    fi
    echo "Conductor IP: $CONDUCTOR_IP"

    # Wrap IPv6 addresses in brackets for URL construction (RFC 3986)
    CONDUCTOR_URL_IP="${CONDUCTOR_IP}"
    [[ "$CONDUCTOR_IP" == *:* ]] && CONDUCTOR_URL_IP="[${CONDUCTOR_IP}]"

    for node in $(${BASH_ALIASES[openstack]} baremetal node list -c UUID -f value); do
      ${BASH_ALIASES[openstack]} baremetal node set $node \
        --driver-info deploy_ramdisk=http://${CONDUCTOR_URL_IP}:8088/ironic-python-agent.initramfs \
        --driver-info deploy_kernel=http://${CONDUCTOR_URL_IP}:8088/ironic-python-agent.kernel
    done

- name: Post-adoption baremetal node management
  when:
    - ironic_post_adoption_manage_nodes | bool or
      ironic_post_adoption_inspect_nodes | bool or
      ironic_post_adoption_provide_nodes | bool
  ansible.builtin.shell:
    cmd: |
      {{ shell_header }}
      {{ oc_header }}
      export OPENSTACK_COMMAND="oc exec -t openstackclient -- openstack"
      export IRONIC_POST_ADOPTION_MANAGE_NODES={{ ironic_post_adoption_manage_nodes | string | lower }}
      export IRONIC_POST_ADOPTION_INSPECT_NODES={{ ironic_post_adoption_inspect_nodes | string | lower }}
      export IRONIC_POST_ADOPTION_PROVIDE_NODES={{ ironic_post_adoption_provide_nodes | string | lower }}
      {{ lookup('ansible.builtin.file', 'post_adoption_manage_nodes.bash') }}
