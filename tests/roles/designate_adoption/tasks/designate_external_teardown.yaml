- name: Remove externalBindsSecret reference from Designate CR
  ansible.builtin.shell: |
    {{ shell_header }}
    {{ oc_header }}

    oc patch openstackcontrolplane openstack --type=json --patch '
    [{"op": "remove", "path": "/spec/designate/template/externalBindsSecret"}]
    '
  register: designate_external_remove_results
  changed_when: true
  failed_when: designate_external_remove_results.rc != 0

- name: Wait for the designate service to reconcile after removing external binds
  ansible.builtin.shell: |
    {{ shell_header }}
    {{ oc_header }}

    oc wait --for condition=Ready --timeout=300s designates.designate.openstack.org/designate
  register: designate_teardown_ready_result
  until: designate_teardown_ready_result is success
  retries: 60
  delay: "{{ designate_retry_delay }}"

- name: Delete the external binds secret
  ansible.builtin.shell: |
    {{ shell_header }}
    {{ oc_header }}

    oc delete secret designate-external-binds -n openstack
  register: designate_external_secret_delete
  changed_when: true
  failed_when: designate_external_secret_delete.rc != 0

- name: Delete the mDNS LoadBalancer service
  ansible.builtin.shell: |
    {{ shell_header }}
    {{ oc_header }}

    oc delete service designate-external-master -n openstack
  register: designate_external_mdns_delete
  changed_when: true
  failed_when: designate_external_mdns_delete.rc != 0

- name: Revert the BIND9 configuration
  ansible.builtin.shell: |
    {{ shell_header }}
    {{ oc_header }}
    echo "Reverting BIND9 reconfiguration"
    for i in {1..3}; do
      SSH_CMD=CONTROLLER${i}_SSH
      if [ ! -z "${!SSH_CMD}" ]; then
        echo "Reconfiguring bind on controller $i"
        ${!SSH_CMD} cp /var/lib/config-data/ansible-generated/designate/etc/named/rndc.conf.pre-adoption-backup /var/lib/config-data/ansible-generated/designate/etc/named/rndc.conf
        ${!SSH_CMD} cp /var/lib/config-data/ansible-generated/designate/etc/named/options.conf.pre-adoption-backup /var/lib/config-data/ansible-generated/designate/etc/named/options.conf
        echo "Restarting bind on controller $i"
        ${!SSH_CMD} systemctl restart designate-designatebackendbind9
      fi
    done
