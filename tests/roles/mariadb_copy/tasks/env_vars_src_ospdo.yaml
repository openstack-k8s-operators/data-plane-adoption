- name: set src MariaDB copy shell vars
  no_log: "{{ use_no_log }}"
  ansible.builtin.set_fact:
    mariadb_copy_shell_vars_src: |
      MARIADB_IMAGE=quay.io/podified-antelope-centos9/openstack-mariadb:current-podified
      # TODO: remove the default(external_...) when CI is transitioned to use 'source_...'
      SOURCE_MARIADB_IP=${sshpass -p{{ admin_password }} ssh root@{{ adoption_ospdo_host }} 'export KUBECONFIG=/home/ocp/crucible/kubeconfig.ostest; oc exec -t -n openstack openstackclient -c openstackclient -- bash -c "ssh controller-0.ctlplane sudo cat /var/lib/config-data/puppet-generated/haproxy/etc/haproxy/haproxy.cfg "'| grep -A1 'listen mysql'|tail -n 1|sed 's/.*bind //g' |sed 's/:3306.*//g'}

      declare -A SOURCE_GALERA_MEMBERS
      SOURCE_GALERA_MEMBERS=(
      ["standalone.localdomain"]=$SOURCE_MARIADB_IP-
      # ...
      )
      SOURCE_DB_ROOT_PASSWORD=${sshpass -p{{ admin_password }} ssh root@{{ adoption_ospdo_host }} 'export KUBECONFIG=/home/ocp/crucible/kubeconfig.ostest; oc get secret tripleo-passwords -o jsonpath='{.data.*}' | base64 -d | grep MysqlRootPassword'|sed 's/.*: //g'}
